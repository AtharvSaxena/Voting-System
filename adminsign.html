<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<title>Admin Signup</title>

<style>
*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:'Segoe UI', sans-serif;
}

body{
	background: linear-gradient(135deg, #4facfe, #00f2fe);
	min-height:100vh;
}

.nav{
	height:65px;
	background: rgba(255,255,255,0.2);
	backdrop-filter: blur(10px);
	display:flex;
	align-items:center;
	justify-content:center;
	box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.link{
	display:flex;
	gap:30px;
}

.anchor{
	color:white;
	text-decoration:none;
	font-size:16px;
	padding:8px 15px;
	border-radius:20px;
	transition:0.3s;
}

.anchor:hover{
	background:white;
	color:#4facfe;
}

#container{
	width:380px;
	margin:60px auto;
	padding:30px;
	border-radius:15px;
	background: rgba(255,255,255,0.15);
	backdrop-filter: blur(15px);
	box-shadow:0 8px 25px rgba(0,0,0,0.3);
	text-align:center;
	color:white;
}

h1{
	margin-bottom:25px;
	font-size:26px;
	letter-spacing:1px;
}

.sign{
	display:flex;
	align-items:center;
	background:white;
	border-radius:25px;
	margin:12px 0;
	padding:8px 15px;
	box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.sign i{
	color:#4facfe;
	margin-right:10px;
}

.sign input{
	border:none;
	outline:none;
	width:100%;
	font-size:14px;
	background:transparent;
}

.sign input[type="date"]{
	color:#555;
}

#btn{
	width:100%;
	height:45px;
	margin-top:20px;
	border:none;
	border-radius:25px;
	background:linear-gradient(45deg,#4facfe,#00f2fe);
	color:white;
	font-size:16px;
	cursor:pointer;
	transition:0.3s;
}

#btn:hover{
	transform:scale(1.05);
	box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#log{
	color:#fff;
	font-weight:bold;
	text-decoration:none;
}

#log:hover{
	text-decoration:underline;
}
</style>
</head>

<body>

<div class="nav">
	<div class="link">
		<a href="index.html" class="anchor">Home</a>
		<a href="#" class="anchor">Dashboard</a>
		<a href="#" class="anchor">Manage</a>
		<a href="#" class="anchor">Admin</a>
	</div>
</div>

<div id="container">
	<h1>Admin Sign Up</h1>

	<form>

		<div class="sign">
			<i class="fa fa-user"></i>
			<input type="text" placeholder="Full Name" required>
		</div>

		<div class="sign">
			<i class="fa fa-id-badge"></i>
			<input type="text" placeholder="Admin ID" required>
		</div>

		<div class="sign">
			<i class="fa fa-envelope"></i>
			<input type="email" placeholder="Email Address" required>
		</div>

		<div class="sign">
			<i class="fa fa-calendar"></i>
			<input type="date" required>
		</div>

		<div class="sign">
			<i class="fa fa-lock"></i>
			<input type="password" placeholder="Password" required>
		</div>

		<div class="sign">
			<i class="fa fa-lock"></i>
			<input type="password" placeholder="Confirm Password" required>
		</div>

		<input type="submit" value="Sign Up" id="btn">

		<br><br>
		<p>Already have an account? <a href="adminlog.html" id="log">Login</a></p>

	</form>
</div>

</body>
</html>
