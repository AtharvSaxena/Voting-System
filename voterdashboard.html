<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<title>Voter Dashboard</title>

<style>
*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:'Segoe UI', sans-serif;
}

body{
	background: linear-gradient(135deg, #4facfe, #00f2fe);
	min-height:100vh;
}

/* NAVBAR */
.nav{
	height:65px;
	background: rgba(255,255,255,0.2);
	backdrop-filter: blur(10px);
	display:flex;
	align-items:center;
	justify-content:space-between;
	padding:0 30px;
	box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
	color:white;
	font-size:22px;
	font-weight:bold;
}

.anchor{
	color:white;
	text-decoration:none;
	padding:8px 15px;
	border-radius:20px;
}

/* CONTAINER */
.container{
	display:grid;
	grid-template-columns:1fr;
	gap:30px;
	padding:40px;
}

/* CARD */
.card{
	background:white;
	border-radius:15px;
	padding:20px;
	box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card h2{
	margin-bottom:15px;
	color:#4facfe;
	text-align:center;
}

/* TABLE */
table{
	width:100%;
	border-collapse:collapse;
}

th, td{
	padding:10px;
	border-bottom:1px solid #ddd;
	text-align:center;
}

th{
	background:#4facfe;
	color:white;
}

tr:hover{
	background:#f1f1f1;
}

/* BUTTON */
.vote-btn{
	padding:6px 12px;
	border:none;
	background:#28a745;
	color:white;
	border-radius:5px;
	cursor:pointer;
}

.vote-btn:disabled{
	background:gray;
	cursor:not-allowed;
}

/* RESULT BAR */
.bar{
	height:10px;
	background:#ddd;
	border-radius:10px;
	overflow:hidden;
}

.fill{
	height:100%;
	background:#4facfe;
}

/* WINNER */
.winner{
	background:#e6f7ff !important;
	font-weight:bold;
}

.badge{
	background:#4facfe;
	color:white;
	padding:5px 10px;
	border-radius:15px;
	font-size:12px;
}

/* MESSAGE */
.message{
	text-align:center;
	margin-bottom:15px;
	font-weight:bold;
	color:green;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
	<div class="logo">Voter Panel</div>

	<div>
		<a href="#" class="anchor">Dashboard</a>
		<a href="#" class="anchor">Results</a>
		<a href="#" class="anchor">Logout</a>
	</div>
</div>

<div class="container">

	<!-- VOTING SECTION -->
	<div class="card">
		<h2>Cast Your Vote</h2>

		<div id="voteMessage" class="message"></div>

		<table>
			<tr>
				<th>Candidate</th>
				<th>Party</th>
				<th>Vote</th>
			</tr>

			<tr>
				<td>Rahul Sharma</td>
				<td>ABC Party</td>
				<td><button class="vote-btn" onclick="vote('Rahul Sharma')">Vote</button></td>
			</tr>

			<tr>
				<td>Amit Verma</td>
				<td>XYZ Party</td>
				<td><button class="vote-btn" onclick="vote('Amit Verma')">Vote</button></td>
			</tr>

			<tr>
				<td>Sneha Singh</td>
				<td>PQR Party</td>
				<td><button class="vote-btn" onclick="vote('Sneha Singh')">Vote</button></td>
			</tr>

		</table>
	</div>

	<!-- YOUR VOTE -->
	<div class="card">
		<h2>Your Vote</h2>
		<p id="yourVote" style="text-align:center;">Not voted yet</p>
	</div>

	<!-- RESULTS -->
	<div class="card">
		<h2>Election Results</h2>

		<table>
			<tr>
				<th>Candidate</th>
				<th>Votes</th>
				<th>Percentage</th>
				<th>Status</th>
			</tr>

			<tr id="r1">
				<td>Rahul Sharma</td>
				<td id="v1">0</td>
				<td>
					<div class="bar"><div id="p1" class="fill" style="width:0%"></div></div>
					<span id="t1">0%</span>
				</td>
				<td id="s1">-</td>
			</tr>

			<tr id="r2">
				<td>Amit Verma</td>
				<td id="v2">0</td>
				<td>
					<div class="bar"><div id="p2" class="fill" style="width:0%"></div></div>
					<span id="t2">0%</span>
				</td>
				<td id="s2">-</td>
			</tr>

			<tr id="r3">
				<td>Sneha Singh</td>
				<td id="v3">0</td>
				<td>
					<div class="bar"><div id="p3" class="fill" style="width:0%"></div></div>
					<span id="t3">0%</span>
				</td>
				<td id="s3">-</td>
			</tr>

		</table>
	</div>

</div>

<script>
let voted = false;

let votes = {
	"Rahul Sharma": 0,
	"Amit Verma": 0,
	"Sneha Singh": 0
};

function vote(name){
	if(voted){
		alert("You have already voted!");
		return;
	}

	votes[name]++;
	voted = true;

	document.getElementById("voteMessage").innerText = "Vote successfully submitted!";
	document.getElementById("yourVote").innerText = name;

	// disable all buttons
	let btns = document.querySelectorAll(".vote-btn");
	btns.forEach(btn => btn.disabled = true);

	updateResults();
}

function updateResults(){
	let total = votes["Rahul Sharma"] + votes["Amit Verma"] + votes["Sneha Singh"];

	let names = ["Rahul Sharma","Amit Verma","Sneha Singh"];

	names.forEach((n,i)=>{
		let v = votes[n];
		let percent = total ? ((v/total)*100).toFixed(1) : 0;

		document.getElementById("v"+(i+1)).innerText = v;
		document.getElementById("p"+(i+1)).style.width = percent+"%";
		document.getElementById("t"+(i+1)).innerText = percent+"%";
		document.getElementById("s"+(i+1)).innerText = "";
		document.getElementById("r"+(i+1)).classList.remove("winner");
	});

	// find winner
	let max = Math.max(...Object.values(votes));

	names.forEach((n,i)=>{
		if(votes[n] === max && max>0){
			document.getElementById("s"+(i+1)).innerHTML = "<span class='badge'>Winner</span>";
			document.getElementById("r"+(i+1)).classList.add("winner");
		}
	});
}
</script>

</body>
</html>
