<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<title>Result Dashboard</title>

<style>
*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND (SAME AS YOUR CODE) */
body{
	background: linear-gradient(135deg, #4facfe, #00f2fe);
	min-height:100vh;
}

/* NAVBAR (SAME) */
.nav{
	height:65px;
	background: rgba(255,255,255,0.2);
	backdrop-filter: blur(10px);
	display:flex;
	align-items:center;
	justify-content:space-between;
	padding:0 30px;
	box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.logo{
	color:white;
	font-size:22px;
	font-weight:bold;
}

.anchor{
	color:white;
	text-decoration:none;
	padding:8px 15px;
	border-radius:20px;
}

/* CONTAINER */
.container{
	display:grid;
	grid-template-columns:1fr;
	padding:40px;
}

/* CARD */
.card{
	background:white;
	border-radius:15px;
	padding:20px;
	box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card h2{
	margin-bottom:15px;
	color:#4facfe;
	text-align:center;
}

/* TABLE */
table{
	width:100%;
	border-collapse:collapse;
}

th, td{
	padding:10px;
	border-bottom:1px solid #ddd;
	text-align:center;
}

th{
	background:#4facfe;
	color:white;
}

tr:hover{
	background:#f1f1f1;
}

/* PROGRESS BAR */
.bar{
	height:10px;
	background:#ddd;
	border-radius:10px;
	overflow:hidden;
}

.fill{
	height:100%;
	background:#4facfe;
}

/* WINNER */
.winner{
	background:#e6f7ff !important;
	font-weight:bold;
}

/* BADGE */
.badge{
	background:#4facfe;
	color:white;
	padding:5px 10px;
	border-radius:15px;
	font-size:12px;
}

/* RESPONSIVE */
@media(max-width:768px){
	.container{
		grid-template-columns:1fr;
	}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="nav">
	<div class="logo">Result Panel</div>

	<div>
		<a href="#" class="anchor">Dashboard</a>
		<a href="#" class="anchor">Results</a>
		<a href="#" class="anchor">Logout</a>
	</div>
</div>

<!-- RESULTS -->
<div class="container">

	<div class="card">
		<h2>Election Results</h2>

		<table>
			<tr>
				<th>Candidate</th>
				<th>Party</th>
				<th>Votes</th>
				<th>Percentage</th>
				<th>Status</th>
			</tr>

			<tr class="winner">
				<td>Rahul Sharma</td>
				<td>ABC Party</td>
				<td>520</td>
				<td>
					<div class="bar">
						<div class="fill" style="width:52%"></div>
					</div>
					52%
				</td>
				<td><span class="badge">Winner</span></td>
			</tr>

			<tr>
				<td>Amit Verma</td>
				<td>XYZ Party</td>
				<td>300</td>
				<td>
					<div class="bar">
						<div class="fill" style="width:30%"></div>
					</div>
					30%
				</td>
				<td>-</td>
			</tr>

			<tr>
				<td>Sneha Singh</td>
				<td>PQR Party</td>
				<td>180</td>
				<td>
					<div class="bar">
						<div class="fill" style="width:18%"></div>
					</div>
					18%
				</td>
				<td>-</td>
			</tr>

		</table>
	</div>

</div>

</body>
</html>
