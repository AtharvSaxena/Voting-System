<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<title>Sign up</title>
<style>
	*{
		padding:0;
		margin:0;
	}
	
	#container{
		height:500px;
		width:400px;
		background-color:white;
		border-top:3px solid black;
		border-bottom:3px solid black;
		border-radius:10px;
		margin-top:100px;
		margin-left:40%;
		text-align:center;
		box-shadow:5px 5px 5px 0px grey ;
	}
	.sign{
		margin:10px;
		height:20px;
		width:325px;
		border-radius:3px;
		box-shadow:5px 5px 5px 0px grey ;
	}
	#btn{
		margin:10px;
		height:30px;
		width:325px;
		border-radius:3px;
		box-shadow:5px 5px 5px 0px grey ;
		background:linear-gradient(blue, #35C1FF);
		color:white;
	}
	#lbl{
		margin:10px;
	}
	#log{
		text-decoration: none;
	}

	#div{

	}
	.lock{
		padding:10px;
	}
</style>
</head>
<body>
	<div class="div">
<div id="container">
		<h1 id="head">Registration Form</h1>
		<form>
			<i class="fa fa-user-circle" aria-hidden="true"></i>
			<input type="text" placeholder="First Name" class="sign" style="width:150px;">
			<i class="fa fa-user-circle" aria-hidden="true"></i>
			<input type="text" placeholder="Last Name" class="sign" style="width:150px;">
			<i class="fa fa-envelope" aria-hidden="true"></i>
			<input type="email" placeholder="Example@mail.com" class="sign">
			<i class="fa fa-lock lock" aria-hidden="true"></i>
			<input type="password" placeholder="Password" class="sign">
			<i class="fa fa-lock lock" aria-hidden="true"></i>
			<input type="password" placeholder="Confirm Password" class="sign">
			<input type="submit" value="Sign Up" id="btn">
			<br>
			<label id="lbl">Already have an account?<a href="#" id="log">login</a></label>
		</form>		
</div>

</div>

</body>
</html>
