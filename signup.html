<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<title>Sign Up</title>
	<style>
		* {
			padding: 0;
			margin: 0;
		}

		body {
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
			background: linear-gradient(blue, white);
		}

		#container {
			width: 400px;
			background-color: white;
			border-top: 3px solid black;
			border-bottom: 3px solid black;
			border-radius: 10px;
			padding: 20px;
			box-shadow: 5px 5px 10px 0px #016396;
			text-align: center;
		}

		h1 {
			margin-bottom: 20px;
			font-family:Georgia;
			text-shadow:2px 2px 5px grey;
		}

		.sign {
			display: flex;
			align-items: center;
			margin: 10px 0;
		}

		.sign i {
			font-size: 18px;
			color: grey;
			margin-right: 10px;
		}

		.sign input {
			width: 100%;
			max-width: 325px;
			height: 30px;
			border-radius: 3px;
			padding-left: 10px;
			border: 1px solid #ccc;
			box-shadow: 5px 5px 5px 0px grey;
		}

		#btn {
			width: 100%;
			max-width: 325px;
			height: 40px;
			margin-top: 20px;
			background: linear-gradient(blue, #35C1FF);
			color: white;
			border-radius: 3px;
			border: none;
			cursor: pointer;
			box-shadow: 5px 5px 5px 0px grey;
		}

		#btn:hover {
			background: linear-gradient(#35C1FF, blue);
		}

		#lbl {
			margin-top: 10px;
		}

		#log {
			text-decoration: none;
			color: #35C1FF;
		}

		#log:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>

<div id="container">
	<h1>Registration Form</h1>
	<form>
		<div class="sign">
			<i class="fa fa-user-circle" aria-hidden="true"></i>
			<input type="text" placeholder="First Name">
		</div>

		<div class="sign">
			<i class="fa fa-user-circle" aria-hidden="true"></i>
			<input type="text" placeholder="Last Name">
		</div>

		<div class="sign">
			<i class="fa fa-envelope" aria-hidden="true"></i>
			<input type="email" placeholder="Example@mail.com">
		</div>

		<div class="sign">
			<i class="fa fa-lock" aria-hidden="true"></i>
			<input type="password" placeholder="Password">
		</div>

		<div class="sign">
			<i class="fa fa-lock" aria-hidden="true"></i>
			<input type="password" placeholder="Confirm Password">
		</div>

		<input type="submit" value="Sign Up" id="btn">

		<br><br>
		<label id="lbl">Already have an account?<a href="#" id="log">Login</a></label>
	</form>
</div>

</body>
</html>
